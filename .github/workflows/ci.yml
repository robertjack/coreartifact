# The three gates (typecheck / test / build) on every push and PR — the
# same commands the spec's verify profile names, run raw (no .coreartifact
# ledger exists in CI; evidence binding is a local-machine concern).
# Prerequisite for npm provenance at the v1 publish (spec "Launch acts").
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # ISS-0032's browser flow drives the built dashboard through
      # playwright's pinned chromium; without the browser binary the test
      # would fail loudly (by design — it never silently skips).
      - run: pnpm exec playwright install chromium

      - run: pnpm run typecheck

      - run: pnpm run build

      - run: pnpm test
