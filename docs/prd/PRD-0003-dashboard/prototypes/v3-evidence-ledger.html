<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>coreartifact — the ledger (prototype V3: evidence-ledger)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --paper:#f2ede0; --paper-2:#eae3d0; --ink:#211d14; --ink-soft:#3c362a; --ink-faint:#8c8371;
    --green:#1f5c3a; --green-bg:#e8efe4;
    --red:#8a1f1f; --red-bg:#f3e6e3;
    --amber:#8a5a12; --amber-bg:#f2e8d2;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    --sans: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; /* commit: monospace-forward throughout, terminal-native taste */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--paper);
    background-image: repeating-linear-gradient(0deg, rgba(0,0,0,.012) 0px, rgba(0,0,0,.012) 1px, transparent 1px, transparent 3px);
    font-size:13.5px; line-height:1.55;
  }
  a{color:inherit;}
  button{font:inherit; cursor:pointer;}
  .muted{color:var(--ink-faint);}

  .topbar{border-bottom:3px double var(--ink); padding:14px 24px 12px; display:flex; justify-content:space-between; align-items:flex-end;}
  .brand{font-weight:700; font-size:16px; letter-spacing:.03em; text-transform:uppercase;}
  .brand .sub{display:block; font-size:9.5px; letter-spacing:.16em; color:var(--ink-faint); font-weight:400; margin-top:3px;}
  .tag{font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-faint); border:1px solid var(--ink-faint); padding:3px 8px;}

  .shell{max-width:760px; margin:0 auto; padding:26px 24px 120px;}

  .claim-label{font-size:10.5px; letter-spacing:.2em; color:var(--ink-faint); text-transform:uppercase; margin-bottom:8px;}
  .claim{font-size:22px; font-weight:700; line-height:1.35; margin-bottom:18px;}
  .claim .n{border-bottom:2px solid var(--ink);}

  .receipt-block{border:1px solid var(--ink-soft); padding:16px 20px; margin-bottom:20px; background:rgba(255,255,255,.25);}
  .receipt-block h4{font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint); margin:0 0 12px; font-weight:700;}
  .receipt-line{display:flex; align-items:baseline; gap:4px; padding:3px 0; font-size:13px;}
  .receipt-line .label{white-space:nowrap;}
  .receipt-line .leader{flex:1; border-bottom:1px dotted var(--ink-faint); height:0; margin-bottom:4px;}
  .receipt-line .value{white-space:nowrap; font-weight:700; font-variant-numeric:tabular-nums;}
  .receipt-line.unknown .value, .receipt-line.unknown .label{color:var(--amber);}
  .receipt-line.warn .value{color:var(--amber);}

  .notice{border:1.5px solid var(--amber); background:var(--amber-bg); padding:11px 16px; margin-bottom:16px; font-size:12.5px;}
  .notice .hdr{font-weight:700; letter-spacing:.1em; text-transform:uppercase; font-size:10.5px; color:var(--amber); margin-bottom:5px;}
  .notice code{font-family:var(--mono); background:rgba(0,0,0,.06); padding:0 3px;}

  .window-line{font-size:11px; color:var(--ink-faint); margin:-6px 0 20px;}

  .perforation{border:none; border-top:2px dashed var(--ink-faint); margin:24px 0; position:relative;}
  .perforation .scissors{position:absolute; left:0; top:-9px; background:var(--paper); padding:0 6px; font-size:11px; color:var(--ink-faint);}

  /* ---------- session list (receipt line items) ---------- */
  .list-title{font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:10px; font-weight:700;}
  .ledger-row{
    display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:none; border:none;
    padding:9px 4px; border-bottom:1px dashed var(--ink-faint); font-family:var(--mono); font-size:12.5px; color:var(--ink);
  }
  .ledger-row:hover{background:rgba(0,0,0,.035);}
  .ledger-row:focus-visible{outline:2px solid var(--ink); outline-offset:1px;}
  .lr-id{font-weight:700; min-width:82px;}
  .lr-kind{min-width:78px; color:var(--ink-soft); font-size:11.5px;}
  .lr-stamp-slot{min-width:96px;}
  .lr-leader{flex:1; border-bottom:1px dotted var(--ink-faint); height:0; margin-bottom:4px;}
  .lr-cost{min-width:96px; text-align:right; font-weight:700;}
  .lr-date{min-width:110px; text-align:right; color:var(--ink-faint); font-size:11px;}
  .cap-footer{display:flex; justify-content:space-between; font-size:11px; color:var(--ink-faint); margin-top:10px; padding-top:8px; border-top:1px solid var(--ink-soft);}

  /* ---------- stamps: verified/failing/unverified/pass/fail ---------- */
  .stamp{
    display:inline-block; font-weight:700; text-transform:uppercase; letter-spacing:.09em; font-size:10.5px;
    padding:2px 9px; border:1.4px solid; outline:1px solid; outline-offset:2px; border-radius:2px; background:rgba(255,255,255,.4);
  }
  .stamp.verified{color:var(--green); border-color:var(--green); transform:rotate(-1.5deg);}
  .stamp.failing{color:var(--red); border-color:var(--red); transform:rotate(1.5deg);}
  .stamp.unverified{color:var(--ink-soft); border-color:var(--ink-faint); border-style:dashed; outline-style:dashed;}
  .stamp.pass{color:var(--green); border-color:var(--green);}
  .stamp.fail{color:var(--red); border-color:var(--red);}
  .not-delegated{color:var(--ink-faint); font-size:11px; font-style:italic;}

  .kind-tag{font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; padding:1px 6px; border:1px solid var(--ink-faint); color:var(--ink-soft);}

  /* ---------- ABSENT — V3 taste: a redacted ink bar; click reveals the recorded reason
     as a torn evidence note underneath. Self-describing nullables get a plain dash,
     never redacted, because there is nothing withheld to reveal. ---------- */
  details.redacted{display:inline-block; vertical-align:middle;}
  details.redacted summary{
    list-style:none; cursor:pointer; display:inline-flex; align-items:center; gap:7px;
    background:var(--ink); color:var(--paper); font-family:var(--mono); font-size:10px;
    letter-spacing:.18em; text-transform:uppercase; padding:3px 10px; border-radius:1px;
  }
  details.redacted summary::-webkit-details-marker{display:none;}
  details.redacted summary::before{content:"░░░";}
  details.redacted summary::after{content:"░░░";}
  details.redacted .reason-note{
    margin-top:5px; font-size:11px; background:var(--paper-2); border:1px dashed var(--ink-faint);
    padding:6px 10px; max-width:320px; color:var(--ink-soft);
  }
  .reason-note b{color:var(--ink);}
  .quiet-dash{color:var(--ink-faint);}
  .derived-mark{font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); border:1px solid var(--ink-faint); padding:0 4px; margin-left:6px;}

  /* ---------- session view / full receipt ---------- */
  .back-link{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; color:var(--ink-soft); text-decoration:none; margin-bottom:16px; letter-spacing:.04em; text-transform:uppercase;}
  .back-link:hover{color:var(--ink);}
  .receipt-header{border:1px solid var(--ink); padding:18px 22px; margin-bottom:0;}
  .receipt-header .rid{font-size:14px; font-weight:700; letter-spacing:.02em; margin-bottom:12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .fact-line{display:flex; align-items:baseline; gap:4px; padding:3px 0; font-size:12.3px;}
  .fact-line .k{min-width:118px; color:var(--ink-faint); font-size:10.8px; text-transform:uppercase; letter-spacing:.06em;}
  .fact-line .leader{flex:1; border-bottom:1px dotted var(--ink-faint); height:0; margin-bottom:4px;}
  .fact-line .v{font-weight:600; text-align:right; white-space:nowrap;}

  .receipt-body{border:1px solid var(--ink); border-top:none; padding:18px 22px;}
  .section{margin-bottom:22px;}
  .section:last-child{margin-bottom:0;}
  .section h3{font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint); margin:0 0 10px; font-weight:700;}
  .empty-line{font-size:12px; color:var(--ink-faint); font-style:italic;}
  .chip-row{display:flex; flex-wrap:wrap; gap:8px;}
  .check-line{display:flex; align-items:center; gap:8px; border:1px solid var(--ink-soft); padding:5px 10px; font-size:12px;}
  .fp-item{font-family:var(--mono); font-size:11.3px; border-bottom:1px dotted var(--ink-faint); padding:2px 0;}

  .log-row{display:grid; grid-template-columns:26px 78px 76px 1fr; gap:8px; padding:7px 0; border-bottom:1px dotted var(--ink-faint); font-size:12px; align-items:flex-start;}
  .log-row:last-child{border-bottom:none;}
  .log-seq{color:var(--ink-faint);}
  .log-ts{color:var(--ink-soft);}
  .log-kind{font-size:9.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-faint); padding-top:2px;}
  .log-cmd{font-weight:600;}
  .log-meta{font-size:10px; color:var(--ink-faint); margin-top:3px;}
  .outcome-stamp{display:inline-block; font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; padding:1px 7px; border:1px solid; margin-left:8px;}
  .outcome-stamp.success{color:var(--green); border-color:var(--green);}
  .outcome-stamp.failure{color:var(--red); border-color:var(--red);}
  .outcome-stamp.absent{color:var(--ink-faint); border-color:var(--ink-faint); border-style:dashed;}
  .error-block{margin-top:6px; border-left:3px solid var(--red); background:var(--red-bg); padding:6px 10px; font-size:11.5px; white-space:pre-wrap;}
  .test-line{font-size:11px; color:var(--ink-soft); margin-top:4px;}

  /* ---------- full states ---------- */
  .full-state{padding:70px 20px; text-align:center; max-width:440px; margin:0 auto;}
  .void-stamp{display:inline-block; border:3px solid var(--red); color:var(--red); font-size:26px; font-weight:800; letter-spacing:.12em; padding:8px 22px; transform:rotate(-6deg); margin-bottom:20px; outline:1px solid var(--red); outline-offset:4px;}
  .full-state h2{font-size:15px; margin:0 0 8px; letter-spacing:.04em; text-transform:uppercase;}
  .full-state p{font-size:12.5px; color:var(--ink-soft); margin:0 0 18px;}
  .btn{display:inline-flex; align-items:center; gap:6px; border:1px solid var(--ink); background:none; padding:7px 14px; font-size:12px; letter-spacing:.05em; text-transform:uppercase; font-weight:700;}
  .btn:hover{background:rgba(0,0,0,.06);}

  /* ---------- skeleton ---------- */
  .skeleton{background:linear-gradient(90deg,#e5ddc9 25%,#efe9d9 37%,#e5ddc9 63%); background-size:400% 100%; animation:shimmer 1.3s ease infinite;}
  @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}

  .protobar{position:fixed; bottom:0; left:0; right:0; background:var(--ink); color:var(--paper); font-size:10.5px; padding:8px 20px; display:flex; gap:14px; flex-wrap:wrap; align-items:center; border-top:3px double #6b6250; z-index:50; font-family:var(--mono);}
  .protobar b{color:#a89f88; letter-spacing:.1em; text-transform:uppercase; font-size:9.5px;}
  .protobar a{color:#e9c893; text-decoration:none; white-space:nowrap;}
  .protobar a:hover{text-decoration:underline;}
  .protobar .sep{color:#6b6250;}
</style>

/* ============================== HELPERS ============================== */
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtMoney(v){ return "$" + v.toFixed(2); }
function fmtDate(iso){ const d = new Date(iso); return d.toLocaleString(undefined, { month:"short", day:"numeric", hour:"numeric", minute:"2-digit" }); }
function fmtClock(iso){ const d = new Date(iso); return d.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit", second:"2-digit" }); }
function fmtDur(ms){ if (ms===null||ms===undefined) return null; return ms < 1000 ? ms+"ms" : (ms/1000).toFixed(2)+"s"; }
function shortId(id){ return id.slice(0,8); }
function idKeyOf(sid){ return Object.keys(SID).find(k=>SID[k]===sid) || "nope"; }

function classStamp(c){
  if (c === "verified") return `<span class="stamp verified">${ICON.check(9)} verified</span>`;
  if (c === "failing") return `<span class="stamp failing">${ICON.x(9)} failing</span>`;
  if (c === "unverified") return `<span class="stamp unverified">unverified</span>`;
  return `<span class="not-delegated">n/a — not delegated</span>`;
}

/* ABSENT rendering, V3 taste: a redacted ink bar (░░░ ABSENT ░░░) — the receipt's own
   redaction mark. Click to unseal a torn "reason" note beneath, sourced verbatim from
   `absences`. Self-describing nullables carry no reason and are never redacted — they
   print as a plain dash, honestly. */
function redacted(reason){
  return `<details class="redacted"><summary>ABSENT</summary><div class="reason-note"><b>REASON —</b> ${esc(reason)}</div></details>`;
}
function quietDash(note){
  return `<span class="quiet-dash">— ${note ? `<em style="font-size:11px;">${esc(note)}</em>` : ""}</span>`;
}
function renderCost(cost){
  if (cost.value === null) return redacted("cost absent — see receipt below") + `<span class="derived-mark">derived</span>`;
  return `${fmtMoney(cost.value)}<span class="derived-mark">derived</span>`;
}

      ${kpi.unknown_kind > 0 ? `<div class="receipt-line unknown"><span class="label">unknown kind (excluded above)</span><span class="leader"></span><span class="value">${kpi.unknown_kind}</span></div>` : ""}
    </div>

    ${drift.length ? drift.map(d => `
      <div class="notice">
        <div class="hdr">⚠ Notice — drift banner</div>
        session <code>${shortId(d.session_id)}</code> recorded Claude Code <code>${d.version}</code> — outside the tested range <code>${d.range.min}–${d.range.max}</code>.
      </div>
    `).join("") : ""}

    ${unreadable.length ? unreadable.map(r => `
      <div class="notice" style="border-color:var(--ink-soft); background:none;">
        <div class="hdr" style="color:var(--ink-soft);">⚠ ${readableCount} of ${repos.length} registered repos readable</div>
        <code>${esc(r.root)}</code> is <b>unreadable</b>: ${esc(r.reason)} — never silently skipped.
      </div>
    `).join("") : ""}

    <div class="receipt-block">
      <h4>Tiles</h4>
      <div class="receipt-line ${tiles.cost_absent_count>0?'warn':''}"><span class="label">spend (sum of present)</span><span class="leader"></span><span class="value">${fmtMoney(tiles.spend_present_usd)}</span></div>
      ${tiles.cost_absent_count>0 ? `<div class="receipt-line warn"><span class="label" style="font-size:11px;">— cost absent for ${tiles.cost_absent_count} session${tiles.cost_absent_count===1?"":"s"}, never a silent zero</span><span class="leader"></span><span class="value"></span></div>` : ""}
      <div class="receipt-line"><span class="label">sessions — headless</span><span class="leader"></span><span class="value">${tiles.sessions_by_kind.headless}</span></div>
      <div class="receipt-line"><span class="label">sessions — interactive</span><span class="leader"></span><span class="value">${tiles.sessions_by_kind.interactive}</span></div>
      <div class="receipt-line"><span class="label">sessions — unknown</span><span class="leader"></span><span class="value">${tiles.sessions_by_kind.unknown}</span></div>
      <div class="receipt-line"><span class="label">failing bound checks</span><span class="leader"></span><span class="value">${tiles.failing_checks}</span></div>
    </div>

    ${isEmpty ? `
      <div class="full-state" style="padding-top:40px;">
        <div style="font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);border:1px dashed var(--ink-faint);display:inline-block;padding:10px 20px;margin-bottom:16px;">no entries</div>
        <h2>No registered repos</h2>

function factLine(k, valueHtml){
  return `<div class="fact-line"><span class="k">${k}</span><span class="leader"></span><span class="v">${valueHtml}</span></div>`;
}

function renderSessionLoaded(s){
  const f = s.facets;
  const absMap = {}; s.absences.forEach(a => absMap[a.facet] = a.reason);

  const logHtml = s.timeline.map(t => {
    let body = "";
    if (t.kind === "lifecycle"){
      body = `<span class="log-cmd">${t.hook_event_name}</span>`;
    } else if (t.kind === "prompt"){
      body = t.prompt === "" ? `<em class="empty-line">(empty prompt)</em>` : esc(t.prompt);
    } else if (t.kind === "subagent"){
      body = `<span class="log-cmd">${t.hook_event_name}</span> <span class="muted">agent_type=${esc(t.agent_type)}</span>`;
    } else if (t.kind === "command"){
      const oc = t.outcome;
      const tag = oc.state === "success" ? `<span class="outcome-stamp success">success</span>`
        : oc.state === "failure" ? `<span class="outcome-stamp failure">failure</span>`
        : `<span class="outcome-stamp absent">absent</span>`;
      body = `<span class="log-cmd">${esc(t.command)}</span>${t.duration_ms!==null ? ` <span class="muted">· ${fmtDur(t.duration_ms)}</span>` : ` <span class="muted">· duration ${quietDash("not recorded")}</span>`}${tag}`
        + (oc.state === "failure" ? `<div class="error-block">${esc(oc.error)}</div>` : "")
        + (t.test_results ? `<div class="test-line">vitest — ${t.test_results.passed} passed, ${t.test_results.failed} failed, ${t.test_results.skipped} skipped</div>` : "");
    }
    const meta = [
      t.prompt_id ? `prompt_id ${shortId(t.prompt_id)}` : null,
      t.agent_id ? `agent_id ${t.agent_id}` : null,
      t.tool_use_id ? `tool_use_id ${t.tool_use_id}` : null,
    ].filter(Boolean).join(" · ");
    return `
      <div class="log-row">
        <div class="log-seq">${t.seq}</div>
        <div class="log-ts">${fmtClock(t.ts)}</div>
        <div class="log-kind">${t.kind}</div>
        <div>${body}${meta ? `<div class="log-meta">${meta}</div>` : ""}</div>
      </div>
    `;
  }).join("");

  app.innerHTML = `
    <a class="back-link" href="#/">${ICON.back(10)} Return to the ledger</a>
    <div class="receipt-header">
      <div class="rid">${f.session_id} <span class="kind-tag">${f.kind === null ? "unknown" : f.kind}</span> ${f.kind === null ? redacted(absMap.kind||"kind absent") : ""}</div>
      ${factLine("status", f.status)}
      ${factLine("repo_root", `<span style="font-size:11px;">${esc(f.repo_root)}</span>`)}
      ${factLine("worktree_path", f.worktree_path === null ? quietDash("main checkout") : `<span style="font-size:11px;">${esc(f.worktree_path)}</span>`)}
      ${factLine("model", f.model === null ? quietDash("kind unknown") : f.model)}
      ${factLine("cc_version", f.cc_version === null ? quietDash() : f.cc_version)}
      ${factLine("sha_before", f.sha_before === null ? quietDash("boundary absent") : f.sha_before.slice(0,12))}
      ${factLine("sha_after", f.sha_after === null ? quietDash("boundary absent") : f.sha_after.slice(0,12))}
      ${factLine("cost", renderCost(f.cost))}
      ${factLine("tokens", f.tokens.input === null ? redacted("tokens absent") + `<span class="derived-mark">derived</span>` : `in ${f.tokens.input.toLocaleString()} · out ${f.tokens.output.toLocaleString()} · cache-r ${f.tokens.cache_read.toLocaleString()} · cache-c ${f.tokens.cache_creation.toLocaleString()}<span class="derived-mark">derived</span>`)}
      ${factLine("started_at", fmtDate(f.started_at))}
      ${factLine("last_event_at", fmtDate(f.last_event_at))}
      ${factLine("ended_at", f.ended_at === null ? quietDash("no clean end recorded") : fmtDate(f.ended_at))}
    </div>

    <div class="receipt-body">
      <div class="section">
        <h3>Checks</h3>
        ${s.checks.length ? `<div class="chip-row">${s.checks.map(c => `
          <div class="check-line"><span class="stamp ${c.passed?'pass':'fail'}">${c.passed?'pass':'fail'}</span><span>${esc(c.name)}</span><span class="muted">exit ${c.exit_code} · ${c.bound_by}</span></div>
        `).join("")}</div>` : `<div class="empty-line">no bound checks recorded for this session — unverified.</div>`}
      </div>

      <div class="section">
        <h3>Test results</h3>
        ${s.test_results.length ? `<div class="chip-row">${s.test_results.map(tr => `
          <div class="check-line"><span>${tr.parser}</span><span style="color:var(--green);">${tr.passed} passed</span><span style="color:${tr.failed>0?'var(--red)':'var(--ink-faint)'};">${tr.failed} failed</span><span class="muted">${tr.skipped} skipped</span><span class="muted">${tr.duration_ms===null?'· '+quietDash('parser could not extract duration'):'· '+fmtDur(tr.duration_ms)}</span></div>
        `).join("")}</div>` : `<div class="empty-line">test_results: [] — facet ABSENT, no command was claimed by a parser.</div>`}
      </div>

      <div class="section">
        <h3>Footprint</h3>
        ${s.footprint.length ? s.footprint.map(p => `<div class="fp-item">${esc(p)}</div>`).join("") : `<div class="empty-line">no files touched — a real empty set, not ABSENT.</div>`}
      </div>

      <div class="section">
        <h3>Timeline <span style="text-transform:none;font-weight:400;">— flat, spool order, uncapped</span></h3>
        <div>${logHtml}</div>
      </div>
    </div>
  `;
}

/* ============================== ROUTER ============================== */
function parseRoute(){
  const h = location.hash.replace(/^#\/?/, "");
  if (h === "" ) return { screen: "overview", mode: "loaded" };
  if (h === "empty") return { screen: "overview", mode: "empty" };
  if (h === "error") return { screen: "overview", mode: "error" };
  if (h.startsWith("session/")) return { screen: "session", id: h.slice("session/".length) };
  return { screen: "overview", mode: "loaded" };
}

function go(){
  const route = parseRoute();
  if (route.screen === "overview"){
    if (route.mode === "empty") return renderOverviewEmpty();
    if (route.mode === "error") return renderOverviewError();
    renderOverviewSkeleton();
    setTimeout(() => renderOverviewLoaded(OVERVIEW_LOADED, false), 420);
  } else {
    const s = SESSIONS[route.id];
    if (!s) { renderSessionSkeleton(); setTimeout(() => renderSession404(route.id), 300); return; }
    renderSessionSkeleton();
    setTimeout(() => renderSessionLoaded(s), 380);
  }
}

window.addEventListener("hashchange", go);
go();
