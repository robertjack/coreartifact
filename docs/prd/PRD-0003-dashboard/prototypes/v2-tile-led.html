<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>coreartifact — overview (prototype V2: tile-led)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --fg:#0a0a0a; --fg-soft:#27272a; --muted-fg:#6b7280; --faint-fg:#9ca3af;
    --bg:#fafafa; --card:#ffffff; --border:#e5e7eb;
    --green:#15803d; --green-bg:#f0fdf4; --green-border:#bbf7d0;
    --red:#b91c1c; --red-bg:#fef2f2; --red-border:#fecaca;
    --amber:#b45309; --amber-bg:#fffbeb; --amber-border:#fde68a;
    --absent-fg:#78716c; --absent-bg:#f5f5f4; --absent-border:#d6d3d1;
    --radius:14px; --radius-sm:8px;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans); color:var(--fg); background:var(--bg); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;}
  a{color:inherit;}
  button{font:inherit; cursor:pointer;}
  .mono{font-family:var(--mono);}
  .muted{color:var(--muted-fg);}
  .faint{color:var(--faint-fg);}

  .topbar{display:flex; align-items:center; justify-content:space-between; padding:16px 28px 0;}
  .brand{display:flex; align-items:center; gap:9px; font-weight:700; font-size:15px; letter-spacing:-.01em;}
  .brand .dot{width:9px;height:9px;border-radius:3px;background:var(--fg);}
  .tag{font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--faint-fg); border:1px solid var(--border); border-radius:5px; padding:3px 8px; background:var(--card);}

  .shell{max-width:980px; margin:0 auto; padding:18px 28px 110px;}

  .card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:0 1px 2px rgba(0,0,0,.03);}

  /* ---------- hero ---------- */
  .hero{padding:26px 28px 24px; margin-bottom:16px;}
  .hero-label{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted-fg); font-weight:700; margin-bottom:8px;}
  .hero-headline{font-size:28px; font-weight:700; letter-spacing:-.02em; margin-bottom:14px;}
  .hero-bar{display:flex; height:12px; border-radius:999px; overflow:hidden; background:var(--absent-bg); margin-bottom:12px;}
  .hero-bar .seg{height:100%;}
  .seg.verified{background:#22c55e;}
  .seg.failing{background:#ef4444;}
  .seg.unverified{background:#d4d4d8;}
  .hero-legend{display:flex; gap:18px; flex-wrap:wrap; font-size:12.5px;}
  .legend-item{display:flex; align-items:center; gap:6px;}
  .legend-dot{width:9px;height:9px;border-radius:3px;}
  .legend-dot.verified{background:#22c55e;} .legend-dot.failing{background:#ef4444;} .legend-dot.unverified{background:#d4d4d8;}
  .legend-item b{font-variant-numeric:tabular-nums;}
  .hero-note{margin-top:12px; font-size:12.5px; color:var(--amber); background:var(--amber-bg); border:1px solid var(--amber-border); border-radius:var(--radius-sm); padding:8px 12px; display:flex; gap:8px; align-items:flex-start;}
  .hero-window{margin-top:12px; font-size:11.5px; color:var(--faint-fg);}

  .drift-card{margin-bottom:16px; padding:13px 18px; display:flex; gap:10px; align-items:flex-start; border-color:var(--amber-border); background:var(--amber-bg);}
  .drift-card b{color:var(--amber);}
  .repo-card{margin-bottom:16px; padding:11px 18px; display:flex; gap:10px; align-items:flex-start; font-size:12.8px;}

  /* ---------- tile row ---------- */
  .tile-row{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px;}
  .tile-card{padding:16px 18px;}
  .tile-card .tl{font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted-fg); font-weight:700; margin-bottom:8px;}
  .tile-card .tv{font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; margin-bottom:4px;}
  .tile-card .ts{font-size:12px; color:var(--muted-fg);}
  .tile-card .ts.warn{color:var(--amber); font-weight:600;}
  .kind-mini{display:flex; gap:10px; font-size:11.5px; color:var(--muted-fg); margin-top:2px;}

  /* ---------- session list ---------- */
  .list-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; padding:0 2px;}
  .list-head h2{font-size:15px; margin:0;}
  .list-head .cap{font-size:12px; color:var(--muted-fg);}
  .session-list{padding:6px;}
  .session-row{
    display:flex; align-items:center; gap:14px; padding:12px 14px; border-radius:var(--radius-sm);
    text-align:left; width:100%; background:none; border:none; cursor:pointer;
  }
  .session-row:hover{background:#f4f4f5;}
  .session-row:focus-visible{outline:2px solid #2563eb; outline-offset:2px;}
  .session-row + .session-row{border-top:1px solid var(--border);}
  .sr-main{flex:1; min-width:0;}
  .sr-top{display:flex; align-items:center; gap:8px; margin-bottom:3px;}
  .sr-id{font-family:var(--mono); font-size:12.5px; font-weight:600;}
  .sr-sub{font-size:11.8px; color:var(--muted-fg); display:flex; gap:8px;}
  .sr-cost{font-size:13px; font-weight:600; text-align:right; min-width:74px;}
  .sr-date{font-size:11.5px; color:var(--faint-fg); min-width:96px; text-align:right;}

  .badge{display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; border:1px solid; white-space:nowrap;}
  .badge.verified{color:var(--green); background:var(--green-bg); border-color:var(--green-border);}
  .badge.failing{color:var(--red); background:var(--red-bg); border-color:var(--red-border);}
  .badge.unverified{color:var(--muted-fg); background:#f4f4f5; border-color:var(--border);}
  .badge.kind-headless{color:#4338ca; background:#eef2ff; border-color:#c7d2fe;}
  .badge.kind-interactive{color:#0e7490; background:#ecfeff; border-color:#a5f3fc;}
  .badge.kind-unknown{color:var(--amber); background:var(--amber-bg); border-color:var(--amber-border);}
  .dash-quiet{color:var(--faint-fg);}

  .derived-tag{font-size:9.5px; color:var(--faint-fg); border:1px solid var(--border); border-radius:4px; padding:0 4px; margin-left:5px; vertical-align:1px;}

  /* ---------- ABSENT — V2 taste: native <details> disclosure chip, click to reveal reason ---------- */
  details.absent-details{display:inline-block; vertical-align:middle;}
  details.absent-details summary{
    list-style:none; display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:700;
    letter-spacing:.03em; color:var(--absent-fg); background:var(--absent-bg); border:1px solid var(--absent-border);
    padding:2px 8px; border-radius:999px; cursor:pointer;
  }
  details.absent-details summary::-webkit-details-marker{display:none;}
  details.absent-details summary:hover{background:#eeedec;}
  details.absent-details[open] summary{border-radius:6px 6px 0 0;}
  .absent-reason{
    font-size:11.3px; color:#57534e; background:#fbfaf9; border:1px solid var(--absent-border); border-top:none;
    padding:6px 9px; border-radius:0 0 6px 6px; max-width:280px;
  }

  /* ---------- skeleton ---------- */
  .skeleton{background:linear-gradient(90deg,#eee 25%,#f5f5f5 37%,#eee 63%); background-size:400% 100%; animation:shimmer 1.3s ease infinite; border-radius:6px;}
  @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}

  /* ---------- full states ---------- */
  .full-state{padding:70px 20px; text-align:center; max-width:440px; margin:0 auto;}
  .full-state svg{margin-bottom:16px; color:var(--muted-fg);}
  .full-state h2{font-size:16px; margin:0 0 6px;}
  .full-state p{font-size:13px; color:var(--muted-fg); margin:0 0 18px;}
  .btn{display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border); background:var(--card); padding:8px 14px; border-radius:8px; font-size:13px; font-weight:600;}
  .btn:hover{background:#f4f4f5;}

  /* ---------- session view ---------- */
  .back-link{display:inline-flex; align-items:center; gap:5px; font-size:12.5px; color:var(--muted-fg); text-decoration:none; margin-bottom:14px;}
  .back-link:hover{color:var(--fg);}
  .session-card{padding:22px 26px; margin-bottom:16px;}
  .session-card h1{font-size:16px; font-family:var(--mono); margin:0 0 12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .facet-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px 24px;}
  .facet .k{font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted-fg); margin-bottom:3px;}
  .facet .v{font-size:13px;}
  .facet .v.mono{font-family:var(--mono); font-size:12.3px;}

  .section-card{padding:18px 26px; margin-bottom:16px;}
  .section-card h3{font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted-fg); margin:0 0 12px; font-weight:700;}
  .chip-row{display:flex; flex-wrap:wrap; gap:8px;}
  .check-chip{display:flex; align-items:center; gap:6px; border:1px solid var(--border); border-radius:999px; padding:6px 12px; font-size:12.5px; background:#fafafa;}
  .footprint-chip{font-family:var(--mono); font-size:11.8px; background:#f4f4f5; border:1px solid var(--border); border-radius:6px; padding:3px 8px;}
  .empty-line{font-size:12.8px; color:var(--faint-fg); font-style:italic;}

  /* vertical stepper timeline (V2 taste on the timeline, not the ABSENT question, but still distinct from V1's table rows) */
  .stepper{position:relative; padding-left:26px;}
  .stepper::before{content:"";position:absolute; left:6px; top:6px; bottom:6px; width:2px; background:var(--border);}
  .step{position:relative; padding-bottom:20px;}
  .step:last-child{padding-bottom:0;}
  .step-dot{position:absolute; left:-26px; top:3px; width:13px; height:13px; border-radius:50%; border:2px solid var(--card); box-shadow:0 0 0 1.5px var(--border);}
  .step-dot.success{box-shadow:0 0 0 1.5px #22c55e; background:#22c55e;}
  .step-dot.failure{box-shadow:0 0 0 1.5px #ef4444; background:#ef4444;}
  .step-dot.absent{box-shadow:0 0 0 1.5px var(--absent-border); background:var(--absent-bg);}
  .step-dot.neutral{background:#d4d4d8;}
  .step-top{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;}
  .step-ts{font-family:var(--mono); font-size:11px; color:var(--faint-fg);}
  .step-kindlabel{font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted-fg); font-weight:700;}
  .step-body{margin-top:4px; font-size:13px;}
  .step-cmd{font-family:var(--mono); font-size:12.8px;}
  .step-meta{font-size:10.8px; color:var(--faint-fg); margin-top:4px; font-family:var(--mono);}
  .error-text{color:var(--red); font-size:12px; margin-top:6px; font-family:var(--mono); background:var(--red-bg); border:1px solid var(--red-border); border-radius:6px; padding:6px 9px; white-space:pre-wrap;}
  .outcome-tag{display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; padding:1px 8px; border-radius:999px; border:1px solid; margin-left:8px;}
  .outcome-tag.success{color:var(--green); background:var(--green-bg); border-color:var(--green-border);}
  .outcome-tag.failure{color:var(--red); background:var(--red-bg); border-color:var(--red-border);}
  .outcome-tag.absent{color:var(--absent-fg); background:var(--absent-bg); border-color:var(--absent-border);}
  .test-inline{font-size:11.5px; color:var(--muted-fg); margin-top:4px;}

  /* ---------- prototype dev toolbar ---------- */
  .protobar{position:fixed; bottom:0; left:0; right:0; background:#18181b; color:#e4e4e7; font-size:11px; padding:8px 20px; display:flex; gap:14px; flex-wrap:wrap; align-items:center; border-top:2px dashed #52525b; z-index:50;}
  .protobar b{color:#a1a1aa; font-weight:700; letter-spacing:.04em; text-transform:uppercase; font-size:10px;}
  .protobar a{color:#7dd3fc; text-decoration:none; white-space:nowrap;}
  .protobar a:hover{text-decoration:underline;}
  .protobar .sep{color:#52525b;}
</style>

/* ============================== HELPERS ============================== */
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtMoney(v){ return "$" + v.toFixed(2); }
function fmtDate(iso){ const d = new Date(iso); return d.toLocaleString(undefined, { month:"short", day:"numeric", hour:"numeric", minute:"2-digit" }); }
function fmtClock(iso){ const d = new Date(iso); return d.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit", second:"2-digit" }); }
function fmtDur(ms){ if (ms===null||ms===undefined) return null; return ms < 1000 ? ms+"ms" : (ms/1000).toFixed(2)+"s"; }
function shortId(id){ return id.slice(0,8); }
function idKeyOf(sid){ return Object.keys(SID).find(k=>SID[k]===sid) || "nope"; }

function classBadge(c){
  if (c === "verified") return `<span class="badge verified">${ICON.check(10)} verified</span>`;
  if (c === "failing") return `<span class="badge failing">${ICON.x(10)} failing</span>`;
  if (c === "unverified") return `<span class="badge unverified">${ICON.dash(10)} unverified</span>`;
  return `<span class="dash-quiet" title="not a delegated (headless) session">—</span>`;
}
function kindBadge(k){
  if (k === "headless") return `<span class="badge kind-headless">headless</span>`;
  if (k === "interactive") return `<span class="badge kind-interactive">interactive</span>`;
  return `<span class="badge kind-unknown">unknown</span>`;
}

let uidCounter = 0;
/* ABSENT rendering, V2 taste: a native <details> disclosure chip — click to reveal the
   recorded reason inline, no hover dependency, fully keyboard operable.
   Self-describing nullables (no absences row, e.g. sha/ended_at/worktree_path) are NOT
   dressed up this way — they render as a quiet dash with a short plain-text note instead,
   because there is no reason to disclose. */
function absentChip(reason){
  uidCounter++;
  return `<details class="absent-details"><summary>ABSENT</summary><div class="absent-reason">${esc(reason)}</div></details>`;
}
function quietDash(note){
  return `<span class="dash-quiet">— ${note ? `<span style="font-size:11px;">${esc(note)}</span>` : ""}</span>`;
}
function renderCost(cost){
  if (cost.value === null) return absentChip("cost absent — see facet detail below") + `<span class="derived-tag">derived</span>`;
  return `${fmtMoney(cost.value)}<span class="derived-tag">derived</span>`;
}

function facetCell(k, valueHtml){
  return `<div class="facet"><div class="k">${k}</div><div class="v">${valueHtml}</div></div>`;
}

function renderSessionLoaded(s){
  const f = s.facets;
  const absMap = {}; s.absences.forEach(a => absMap[a.facet] = a.reason);

  const stepsHtml = s.timeline.map(t => {
    let dotClass = "neutral", body = "";
    if (t.kind === "lifecycle"){
      body = `<span class="mono">${t.hook_event_name}</span>`;
    } else if (t.kind === "prompt"){
      body = t.prompt === "" ? `<em class="empty-line">(empty prompt)</em>` : esc(t.prompt);
    } else if (t.kind === "subagent"){
      body = `<span class="mono">${t.hook_event_name}</span> <span class="muted">· agent_type=${esc(t.agent_type)}</span>`;
    } else if (t.kind === "command"){
      const oc = t.outcome;
      dotClass = oc.state;
      const tag = oc.state === "success" ? `<span class="outcome-tag success">${ICON.check(10)} success</span>`
        : oc.state === "failure" ? `<span class="outcome-tag failure">${ICON.x(10)} failure</span>`
        : `<span class="outcome-tag absent">${ICON.dash(10)} absent</span>`;
      body = `<span class="step-cmd">${esc(t.command)}</span>${t.duration_ms!==null ? ` <span class="muted">· ${fmtDur(t.duration_ms)}</span>` : ` <span class="muted">· duration ${quietDash("not recorded")}</span>`}${tag}`
        + (oc.state === "failure" ? `<div class="error-text">${esc(oc.error)}</div>` : "")
        + (t.test_results ? `<div class="test-inline">vitest — ${t.test_results.passed} passed, ${t.test_results.failed} failed, ${t.test_results.skipped} skipped</div>` : "");
    }
    const meta = [
      t.prompt_id ? `prompt_id ${shortId(t.prompt_id)}` : null,
      t.agent_id ? `agent_id ${t.agent_id}` : null,
      t.tool_use_id ? `tool_use_id ${t.tool_use_id}` : null,
    ].filter(Boolean).join(" · ");
    return `
      <div class="step">
        <div class="step-dot ${dotClass}"></div>
        <div class="step-top"><span class="step-ts">${fmtClock(t.ts)}</span><span class="step-kindlabel">${t.kind}</span></div>
        <div class="step-body">${body}</div>
        ${meta ? `<div class="step-meta">${meta}</div>` : ""}
      </div>
    `;
  }).join("");

  app.innerHTML = `
    <a class="back-link" href="#/">${ICON.back(11)} Back to overview</a>
    <div class="card session-card">
      <h1>${f.session_id} ${kindBadge(f.kind === null ? "unknown" : f.kind)} ${f.kind === null ? absentChip(absMap.kind||"kind absent") : ""}</h1>
      <div class="facet-grid">
        ${facetCell("status", f.status)}
        ${facetCell("repo_root", `<span class="mono" style="font-size:11.8px;">${esc(f.repo_root)}</span>`)}
        ${facetCell("worktree_path", f.worktree_path === null ? quietDash("main checkout") : `<span class="mono" style="font-size:11.8px;">${esc(f.worktree_path)}</span>`)}
        ${facetCell("model", f.model === null ? quietDash("kind unknown") : f.model)}
        ${facetCell("cc_version", f.cc_version === null ? quietDash() : f.cc_version)}
        ${facetCell("sha_before", f.sha_before === null ? quietDash("boundary absent") : `<span class="mono">${f.sha_before.slice(0,10)}</span>`)}
        ${facetCell("sha_after", f.sha_after === null ? quietDash("boundary absent") : `<span class="mono">${f.sha_after.slice(0,10)}</span>`)}
        ${facetCell("cost", renderCost(f.cost) + (absMap.cost ? `<div style="font-size:11px;color:var(--muted-fg);margin-top:2px;">reason shown above</div>` : ""))}
        ${facetCell("tokens", f.tokens.input === null ? absentChip("tokens absent") + `<span class="derived-tag">derived</span>` : `<span style="font-size:12.3px;">in ${f.tokens.input.toLocaleString()} / out ${f.tokens.output.toLocaleString()} / cache-r ${f.tokens.cache_read.toLocaleString()} / cache-c ${f.tokens.cache_creation.toLocaleString()}</span><span class="derived-tag">derived</span>`)}
        ${facetCell("started_at", fmtDate(f.started_at))}
        ${facetCell("last_event_at", fmtDate(f.last_event_at))}
        ${facetCell("ended_at", f.ended_at === null ? quietDash("no clean end recorded") : fmtDate(f.ended_at))}
      </div>
    </div>

    <div class="card section-card">
      <h3>Checks</h3>
      ${s.checks.length ? `<div class="chip-row">${s.checks.map(c => `
        <div class="check-chip">
          ${c.passed ? `<span style="color:var(--green);">${ICON.check(13)}</span>` : `<span style="color:var(--red);">${ICON.x(13)}</span>`}
          <span class="mono">${esc(c.name)}</span><span class="muted">exit ${c.exit_code} · ${c.bound_by}</span>
        </div>
      `).join("")}</div>` : `<div class="empty-line">No bound checks recorded for this session — unverified.</div>`}
    </div>

    <div class="card section-card">
      <h3>Test results</h3>
      ${s.test_results.length ? `<div class="chip-row">${s.test_results.map(tr => `
        <div class="check-chip">
          <span class="mono">${tr.parser}</span>
          <span style="color:var(--green);">${tr.passed} passed</span>
          <span style="color:${tr.failed>0?'var(--red)':'var(--muted-fg)'};">${tr.failed} failed</span>
          <span class="muted">${tr.skipped} skipped</span>
          <span class="muted">${tr.duration_ms===null?'· '+quietDash('parser could not extract duration'):'· '+fmtDur(tr.duration_ms)}</span>
        </div>
      `).join("")}</div>` : `<div class="empty-line">test_results: [] — facet ABSENT, no command was claimed by a parser.</div>`}
    </div>

    <div class="card section-card">
      <h3>Footprint</h3>
      ${s.footprint.length ? `<div class="chip-row">${s.footprint.map(p => `<span class="footprint-chip">${esc(p)}</span>`).join("")}</div>` : `<div class="empty-line">No files touched — a real empty set, not ABSENT.</div>`}
    </div>

    <div class="card section-card">
      <h3>Timeline <span style="text-transform:none;font-weight:400;color:var(--faint-fg);">(flat, spool order, uncapped)</span></h3>
      <div class="stepper">${stepsHtml}</div>
    </div>
  `;
}

/* ============================== ROUTER ============================== */
function parseRoute(){
  const h = location.hash.replace(/^#\/?/, "");
  if (h === "" ) return { screen: "overview", mode: "loaded" };
  if (h === "empty") return { screen: "overview", mode: "empty" };
  if (h === "error") return { screen: "overview", mode: "error" };
  if (h.startsWith("session/")) return { screen: "session", id: h.slice("session/".length) };
  return { screen: "overview", mode: "loaded" };
}

function go(){
  const route = parseRoute();
  if (route.screen === "overview"){
    if (route.mode === "empty") return renderOverviewEmpty();
    if (route.mode === "error") return renderOverviewError();
    renderOverviewSkeleton();
    setTimeout(() => renderOverviewLoaded(OVERVIEW_LOADED, false), 420);
  } else {
    const s = SESSIONS[route.id];
    if (!s) { renderSessionSkeleton(); setTimeout(() => renderSession404(route.id), 300); return; }
    renderSessionSkeleton();
    setTimeout(() => renderSessionLoaded(s), 380);
  }
}

window.addEventListener("hashchange", go);
go();
</script>

</html>
