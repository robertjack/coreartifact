<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>coreartifact — overview (prototype V1: ops-table)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --fg:#09090b; --fg-soft:#27272a; --muted-fg:#71717a; --faint-fg:#a1a1aa;
    --bg:#ffffff; --muted-bg:#f4f4f5; --thead-bg:#fafafa; --border:#e4e4e7;
    --green:#15803d; --green-bg:#f0fdf4; --green-border:#bbf7d0;
    --red:#b91c1c; --red-bg:#fef2f2; --red-border:#fecaca;
    --amber:#b45309; --amber-bg:#fffbeb; --amber-border:#fde68a;
    --absent-fg:#8b8b93; --absent-bg:#f7f7f8; --absent-border:#e4e4e7;
    --radius:8px;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans); color:var(--fg); background:var(--bg);
    font-size:13.5px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  button{font-family:inherit; font-size:inherit; cursor:pointer;}
  .mono{font-family:var(--mono);}
  .muted{color:var(--muted-fg);}
  .faint{color:var(--faint-fg);}

  /* ---------- top bar ---------- */
  .topbar{
    height:44px; display:flex; align-items:center; justify-content:space-between;
    padding:0 16px; border-bottom:1px solid var(--border); background:var(--bg);
    position:sticky; top:0; z-index:20;
  }
  .brand{display:flex; align-items:center; gap:8px; font-weight:600; letter-spacing:.01em;}
  .brand .dot{width:7px;height:7px;border-radius:2px;background:var(--fg);}
  .topbar nav{display:flex; gap:2px; font-size:12.5px;}
  .topbar nav a{padding:6px 10px; border-radius:6px; color:var(--muted-fg); text-decoration:none;}
  .topbar nav a.active{background:var(--muted-bg); color:var(--fg); font-weight:600;}
  .topbar .tag{
    font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--faint-fg);
    border:1px solid var(--border); border-radius:4px; padding:2px 6px;
  }

  .shell{max-width:1180px; margin:0 auto; padding:0 16px 96px;}

  /* ---------- KPI strip ---------- */
  .kpi-strip{
    display:flex; align-items:center; gap:22px; flex-wrap:wrap;
    padding:16px 0 14px; border-bottom:1px solid var(--border);
  }
  .kpi-headline{font-size:19px; font-weight:650; letter-spacing:-.01em; white-space:nowrap;}
  .kpi-split{display:flex; align-items:center; gap:10px; font-size:12.5px;}
  .split-chip{display:flex; align-items:center; gap:5px; padding:3px 8px; border-radius:999px; border:1px solid; white-space:nowrap;}
  .split-chip .n{font-weight:700; font-variant-numeric:tabular-nums;}
  .split-chip.verified{color:var(--green); background:var(--green-bg); border-color:var(--green-border);}
  .split-chip.failing{color:var(--red); background:var(--red-bg); border-color:var(--red-border);}
  .split-chip.unverified{color:var(--muted-fg); background:var(--muted-bg); border-color:var(--border);}
  .split-chip.unknown{color:var(--amber); background:var(--amber-bg); border-color:var(--amber-border);}
  .kpi-window{margin-left:auto; font-size:11.5px; color:var(--faint-fg); white-space:nowrap;}

  /* ---------- tiles row (compact, table energy not hero cards) ---------- */
  .tiles{display:grid; grid-template-columns:repeat(3,1fr); gap:0; border-bottom:1px solid var(--border);}
  .tile{padding:12px 18px; border-right:1px solid var(--border);}
  .tile:last-child{border-right:none;}
  .tile-label{font-size:10.5px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted-fg); margin-bottom:4px;}
  .tile-value{font-size:16px; font-weight:650; font-variant-numeric:tabular-nums;}
  .tile-sub{font-size:11.5px; color:var(--muted-fg); margin-top:2px;}
  .tile-sub.warn{color:var(--amber);}
  .kind-breakdown{display:flex; gap:10px; font-size:11.5px; color:var(--muted-fg); margin-top:2px; font-variant-numeric:tabular-nums;}

  /* ---------- banners ---------- */
  .banner{
    display:flex; gap:10px; align-items:flex-start; padding:9px 14px; font-size:12.5px;
    border-bottom:1px solid var(--border);
  }
  .banner.drift{background:var(--amber-bg); color:#7c4a05;}
  .banner.repo-warn{background:#fff; color:var(--fg-soft); border-bottom:1px solid var(--border);}
  .banner svg{flex-shrink:0; margin-top:1px;}
  .banner-lines{display:flex; flex-direction:column; gap:2px;}
  .banner code{font-family:var(--mono); font-size:11.5px; background:rgba(0,0,0,.05); padding:1px 4px; border-radius:4px;}

  /* ---------- table ---------- */
  table.sessions{width:100%; border-collapse:collapse; font-size:12.8px;}
  table.sessions thead th{
    position:sticky; top:44px; background:var(--thead-bg); text-align:left; font-weight:600;
    font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted-fg);
    padding:8px 10px; border-bottom:1px solid var(--border);
  }
  table.sessions td{padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:middle;}
  table.sessions tbody tr{cursor:pointer;}
  table.sessions tbody tr:hover{background:var(--muted-bg);}
  table.sessions tbody tr:focus-visible, table.sessions tbody tr:focus{outline:2px solid #2563eb; outline-offset:-2px; background:var(--muted-bg);}
  .sid{font-family:var(--mono); font-size:12px;}
  .row-repo{color:var(--muted-fg); font-size:11.5px;}
  .list-footer{display:flex; justify-content:space-between; align-items:center; padding:10px 10px; font-size:11.5px; color:var(--muted-fg);}

  .badge{
    display:inline-flex; align-items:center; gap:4px; padding:2px 7px; border-radius:5px;
    font-size:11px; font-weight:600; letter-spacing:.02em; border:1px solid; white-space:nowrap;
  }
  .badge.verified{color:var(--green); background:var(--green-bg); border-color:var(--green-border);}
  .badge.failing{color:var(--red); background:var(--red-bg); border-color:var(--red-border);}
  .badge.unverified{color:var(--muted-fg); background:var(--muted-bg); border-color:var(--border);}
  .badge.kind-headless{color:#3730a3; background:#eef2ff; border-color:#c7d2fe;}
  .badge.kind-interactive{color:#0f766e; background:#f0fdfa; border-color:#99f6e4;}
  .badge.kind-unknown{color:var(--amber); background:var(--amber-bg); border-color:var(--amber-border);}
  .dash-quiet{color:var(--faint-fg);}

  /* ---------- absent marker (V1 taste: dense monospace pill, tooltip = reason) ---------- */
  .absent{
    display:inline-flex; align-items:center; gap:4px; font-family:var(--mono); font-size:10.5px;
    color:var(--absent-fg); background:var(--absent-bg); border:1px dashed var(--absent-border);
    padding:1px 6px; border-radius:4px; cursor:help;
  }
  .derived-tag{
    font-size:9.5px; color:var(--faint-fg); border:1px solid var(--border); border-radius:3px;
    padding:0 4px; margin-left:5px; vertical-align:1px; letter-spacing:.03em;
  }

  /* ---------- skeleton / loading ---------- */
  .skeleton{background:linear-gradient(90deg,#f0f0f1 25%,#f7f7f8 37%,#f0f0f1 63%); background-size:400% 100%; animation:shimmer 1.3s ease infinite; border-radius:4px;}
  @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}
  .skel-line{height:12px; margin:4px 0;}

  /* ---------- empty / error full states ---------- */
  .full-state{padding:64px 16px; text-align:center; max-width:460px; margin:0 auto;}
  .full-state svg{margin-bottom:14px;}
  .full-state h2{font-size:15px; margin:0 0 6px;}
  .full-state p{font-size:12.8px; color:var(--muted-fg); margin:0 0 16px;}
  .full-state .zero-kpi{font-size:19px; font-weight:650; margin-bottom:4px;}
  .btn{
    display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border); background:var(--bg);
    padding:6px 12px; border-radius:6px; font-size:12.5px; font-weight:600;
  }
  .btn:hover{background:var(--muted-bg);}

  /* ---------- session view ---------- */
  .session-head{padding:18px 0 14px; border-bottom:1px solid var(--border);}
  .back-link{display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--muted-fg); text-decoration:none; margin-bottom:10px;}
  .back-link:hover{color:var(--fg);}
  .session-title{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .session-title h1{font-size:15px; font-family:var(--mono); font-weight:600; margin:0;}
  .facet-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px 22px; margin-top:16px;}
  .facet{display:flex; flex-direction:column; gap:3px;}
  .facet .k{font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted-fg);}
  .facet .v{font-size:12.8px; font-family:var(--mono);}
  .facet .v.plain{font-family:var(--sans);}

  .section{padding:16px 0; border-bottom:1px solid var(--border);}
  .section h3{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted-fg); margin:0 0 10px; font-weight:700;}
  .checks-row{display:flex; gap:8px; flex-wrap:wrap;}
  .check-badge{display:flex; align-items:center; gap:6px; border:1px solid var(--border); border-radius:6px; padding:5px 10px; font-size:12px;}
  .footprint-list{display:flex; flex-wrap:wrap; gap:6px;}
  .footprint-item{font-family:var(--mono); font-size:11.5px; background:var(--muted-bg); border:1px solid var(--border); border-radius:5px; padding:2px 7px;}
  .empty-line{font-size:12.5px; color:var(--faint-fg); font-style:italic;}

  .timeline{border:1px solid var(--border); border-radius:8px; overflow:hidden;}
  .tl-row{display:grid; grid-template-columns:34px 92px 74px 1fr; gap:10px; padding:8px 12px; border-bottom:1px solid var(--border); font-size:12.3px; align-items:flex-start;}
  .tl-row:last-child{border-bottom:none;}
  .tl-row.lifecycle{background:#fafafa;}
  .tl-row.prompt{background:#fbfbff;}
  .tl-seq{color:var(--faint-fg); font-family:var(--mono); font-size:11px; padding-top:1px;}
  .tl-ts{font-family:var(--mono); font-size:11px; color:var(--muted-fg); white-space:nowrap; padding-top:1px;}
  .tl-kind{font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted-fg); padding-top:2px;}
  .tl-body{min-width:0;}
  .tl-cmd{font-family:var(--mono); font-size:12.3px;}
  .tl-meta{font-size:10.8px; color:var(--faint-fg); margin-top:3px; font-family:var(--mono);}
  .outcome{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:1px 7px; border-radius:4px; border:1px solid; margin-left:8px;}
  .outcome.success{color:var(--green); background:var(--green-bg); border-color:var(--green-border);}
  .outcome.failure{color:var(--red); background:var(--red-bg); border-color:var(--red-border);}
  .outcome.absent{color:var(--absent-fg); background:var(--absent-bg); border-color:var(--absent-border);}
  .error-text{color:var(--red); font-size:11.8px; margin-top:5px; font-family:var(--mono); white-space:pre-wrap;}
  .test-inline{font-size:11px; color:var(--muted-fg); margin-left:8px;}

  /* ---------- prototype dev toolbar (not product chrome) ---------- */
  .protobar{
    position:fixed; bottom:0; left:0; right:0; background:#1c1c1f; color:#e4e4e7;
    font-size:11px; padding:7px 14px; display:flex; gap:14px; flex-wrap:wrap; align-items:center;
    border-top:2px dashed #52525b; z-index:50;
  }
  .protobar b{color:#a1a1aa; font-weight:700; letter-spacing:.04em; text-transform:uppercase; font-size:10px;}
  .protobar a{color:#93c5fd; text-decoration:none; white-space:nowrap;}
  .protobar a:hover{text-decoration:underline;}
  .protobar .sep{color:#52525b;}
</style>

/* ============================== HELPERS ============================== */
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtMoney(v){ return "$" + v.toFixed(2); }
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
}
function fmtClock(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit", second:"2-digit" });
}
function fmtDur(ms){ if (ms===null||ms===undefined) return null; return ms < 1000 ? ms+"ms" : (ms/1000).toFixed(2)+"s"; }
function shortId(id){ return id.slice(0,8); }

function classBadge(c){
  if (c === "verified") return `<span class="badge verified">${ICON.check(11)} verified</span>`;
  if (c === "failing") return `<span class="badge failing">${ICON.x(11)} failing</span>`;
  if (c === "unverified") return `<span class="badge unverified">${ICON.dash(11)} unverified</span>`;
  return `<span class="dash-quiet" title="not a delegated (headless) session — classification is only defined for delegation">—</span>`;
}
function kindBadge(k){
  if (k === "headless") return `<span class="badge kind-headless">headless</span>`;
  if (k === "interactive") return `<span class="badge kind-interactive">interactive</span>`;
  return `<span class="badge kind-unknown">unknown</span>`;
}
/* ABSENT rendering, V1 taste: dashed monospace pill + native title tooltip carrying the reason.
   Self-describing nullables (no absences row) render as a quiet plain dash instead — never
   dressed up as a mystery. */
function absentPill(reason){
  return `<span class="absent" title="${esc(reason)}">ABSENT</span>`;
}
function quietDash(note){
  return `<span class="dash-quiet"${note ? ` title="${esc(note)}"` : ""}>—</span>`;
}
function renderCost(cost){
  if (cost.value === null) return absentPill("cost absent — see facet detail") + `<span class="derived-tag">derived</span>`;
  return `${fmtMoney(cost.value)}<span class="derived-tag">derived</span>`;
}

      <div class="kpi-headline">${kpi.verified} of ${kpi.delegated_total} delegated sessions verified</div>

        <span class="split-chip unverified"><span class="n">${kpi.unverified}</span> unverified</span>
        ${kpi.unknown_kind > 0 ? `<span class="split-chip unknown"><span class="n">${kpi.unknown_kind}</span> session${kpi.unknown_kind===1?"":"s"} of unknown kind</span>` : ""}
      </div>
      <div class="kpi-window">window: ${fmtDate(win.start)} – ${fmtDate(win.end)} (${win.days}d, local)</div>
    </div>

    <div class="tiles">
      <div class="tile">
        <div class="tile-label">Spend (present)</div>
        <div class="tile-value">${fmtMoney(tiles.spend_present_usd)}</div>
        <div class="tile-sub ${tiles.cost_absent_count>0?'warn':''}">${tiles.cost_absent_count>0 ? `cost absent for ${tiles.cost_absent_count} session${tiles.cost_absent_count===1?"":"s"}` : "cost present for every in-window session"}</div>
      </div>
      <div class="tile">
        <div class="tile-label">Sessions by kind</div>
        <div class="tile-value">${tiles.sessions_by_kind.headless + tiles.sessions_by_kind.interactive + tiles.sessions_by_kind.unknown}</div>
        <div class="kind-breakdown">
          <span>${tiles.sessions_by_kind.headless} headless</span>
          <span>${tiles.sessions_by_kind.interactive} interactive</span>
          <span>${tiles.sessions_by_kind.unknown} unknown</span>
        </div>
      </div>
      <div class="tile">
        <div class="tile-label">Failing bound checks</div>
        <div class="tile-value">${tiles.failing_checks}</div>
        <div class="tile-sub">in-window, session-bound only</div>
      </div>
    </div>

    ${drift.length ? drift.map(d => `
      <div class="banner drift">
        ${ICON.alert(15)}
        <div class="banner-lines">
          <div><b>Drift banner</b> — session <code>${shortId(d.session_id)}</code> recorded Claude Code <code>${d.version}</code>, outside the tested range <code>${d.range.min}–${d.range.max}</code>.</div>
        </div>
      </div>
    `).join("") : ""}

    ${unreadable.length ? unreadable.map(r => `
      <div class="banner repo-warn">
        ${ICON.alert(15)}
        <div class="banner-lines">
          <div>${readableCount} of ${repos.length} registered repos readable — <code>${esc(r.root)}</code> is <b>unreadable</b>: ${esc(r.reason)}</div>
        </div>
      </div>
    `).join("") : ""}

    ${isEmpty ? `
      <div class="full-state" style="padding-top:56px;">
        ${ICON.server(30)}
        <h2>No registered repos yet</h2>
        <p>Run <code class="mono">coreartifact init</code> in a repo to register its ledger. The overview renders honest zeros until then — never a blank screen.</p>
      </div>
    ` : `
      <table class="sessions">
        <thead>
          <tr>
            <th style="width:90px;">Session</th>
            <th style="width:100px;">Kind</th>
            <th style="width:140px;">Repo</th>
            <th style="width:110px;">Status</th>
            <th style="width:110px;">Classification</th>
            <th style="width:120px;">Cost</th>
            <th>Started</th>

function facetRow(k, valueHtml){
  return `<div class="facet"><div class="k">${k}</div><div class="v">${valueHtml}</div></div>`;
}

function renderSessionLoaded(s){
  const f = s.facets;
  const absMap = {}; s.absences.forEach(a => absMap[a.facet] = a.reason);

  const timelineHtml = s.timeline.map(t => {
    let body = "";
    let kindLabel = t.kind;
    if (t.kind === "lifecycle"){
      body = `<span class="mono">${t.hook_event_name}</span>`;
    } else if (t.kind === "prompt"){
      body = `<span>${t.prompt === "" ? `<em class="empty-line">(empty prompt)</em>` : esc(t.prompt)}</span>`;
    } else if (t.kind === "subagent"){
      body = `<span class="mono">${t.hook_event_name}</span> <span class="muted">agent_type=${esc(t.agent_type)}</span>`;
    } else if (t.kind === "command"){
      const oc = t.outcome;
      const ocBadge = oc.state === "success" ? `<span class="outcome success">${ICON.check(10)} success</span>`
        : oc.state === "failure" ? `<span class="outcome failure">${ICON.x(10)} failure</span>`
        : `<span class="outcome absent">${ICON.dash(10)} absent</span>`;
      body = `<span class="tl-cmd">${esc(t.command)}</span>${t.duration_ms!==null ? `<span class="muted"> · ${fmtDur(t.duration_ms)}</span>` : `<span class="muted"> · duration ${quietDash("not recorded")}</span>`}${ocBadge}`
        + (oc.state === "failure" ? `<div class="error-text">${esc(oc.error)}</div>` : "")
        + (t.test_results ? `<div class="test-inline">vitest — ${t.test_results.passed} passed, ${t.test_results.failed} failed, ${t.test_results.skipped} skipped</div>` : "");
    }
    const meta = [
      t.prompt_id ? `prompt_id ${shortId(t.prompt_id)}` : null,
      t.agent_id ? `agent_id ${t.agent_id}` : null,
      t.tool_use_id ? `tool_use_id ${t.tool_use_id}` : null,
    ].filter(Boolean).join(" · ");
    return `
      <div class="tl-row ${t.kind}">
        <div class="tl-seq">${t.seq}</div>
        <div class="tl-ts">${fmtClock(t.ts)}</div>
        <div class="tl-kind">${kindLabel}</div>
        <div class="tl-body">${body}${meta ? `<div class="tl-meta">${meta}</div>` : ""}</div>
      </div>
    `;
  }).join("");

  app.innerHTML = `
    <div class="session-head">
      <a class="back-link" href="#/">${ICON.back(11)} Back to overview</a>
      <div class="session-title">
        <h1>${f.session_id}</h1>
        ${kindBadge(f.kind === null ? "unknown" : f.kind)}
        ${f.kind === null ? `<span class="dash-quiet" style="font-size:11.5px;" title="${esc(absMap.kind||'')}">(kind ABSENT — hover)</span>` : ""}
      </div>
      <div class="facet-grid">
        ${facetRow("status", f.status)}
        ${facetRow("repo_root", `<span class="v plain mono" style="font-size:11.5px;">${esc(f.repo_root)}</span>`)}
        ${facetRow("worktree_path", f.worktree_path === null ? `<span class="v plain">${quietDash("main checkout — no worktree")}<span style="font-size:11px;color:var(--faint-fg);"> main checkout</span></span>` : `<span style="font-size:11.5px;">${esc(f.worktree_path)}</span>`)}
        ${facetRow("model", f.model === null ? absentPill(absMap.kind ? "n/a" : "unavailable") : f.model)}
        ${facetRow("cc_version", f.cc_version === null ? quietDash() : f.cc_version)}
        ${facetRow("sha_before", f.sha_before === null ? quietDash("boundary line absent") : f.sha_before.slice(0,10))}
        ${facetRow("sha_after", f.sha_after === null ? quietDash("boundary line absent") : f.sha_after.slice(0,10))}
        ${facetRow("cost", renderCost(f.cost) + (absMap.cost ? ` <span style="font-size:10.5px;color:var(--muted-fg);">— ${esc(absMap.cost)}</span>` : ""))}
        ${facetRow("tokens", f.tokens.input === null ? absentPill("tokens absent") + `<span class="derived-tag">derived</span>` : `in ${f.tokens.input.toLocaleString()} / out ${f.tokens.output.toLocaleString()} / cache-read ${f.tokens.cache_read.toLocaleString()} / cache-create ${f.tokens.cache_creation.toLocaleString()}<span class="derived-tag">derived</span>`)}
        ${facetRow("started_at", fmtDate(f.started_at))}
        ${facetRow("last_event_at", fmtDate(f.last_event_at))}
        ${facetRow("ended_at", f.ended_at === null ? quietDash("no clean session end recorded") : fmtDate(f.ended_at))}
      </div>
    </div>

    <div class="section">
      <h3>Checks</h3>
      ${s.checks.length ? `<div class="checks-row">${s.checks.map(c => `
        <div class="check-badge">
          ${c.passed ? `<span style="color:var(--green);">${ICON.check(13)}</span>` : `<span style="color:var(--red);">${ICON.x(13)}</span>`}
          <span class="mono">${esc(c.name)}</span>
          <span class="muted">exit ${c.exit_code}</span>
          <span class="muted">· bound: ${c.bound_by}</span>
        </div>
      `).join("")}</div>` : `<div class="empty-line">No bound checks recorded for this session — unverified.</div>`}
    </div>

    <div class="section">
      <h3>Test results</h3>
      ${s.test_results.length ? s.test_results.map(tr => `
        <div class="check-badge" style="display:inline-flex;">
          <span class="mono">${tr.parser}</span>
          <span style="color:var(--green);">${tr.passed} passed</span>
          <span style="color:${tr.failed>0?'var(--red)':'var(--muted-fg)'};">${tr.failed} failed</span>
          <span class="muted">${tr.skipped} skipped</span>
          <span class="muted">${tr.duration_ms===null? '· duration '+quietDash('parser could not extract it') : '· '+fmtDur(tr.duration_ms)}</span>
        </div>
      `).join("") : `<div class="empty-line">test_results: [] — facet ABSENT, no command was claimed by a parser.</div>`}
    </div>

    <div class="section">
      <h3>Footprint</h3>
      ${s.footprint.length ? `<div class="footprint-list">${s.footprint.map(p => `<span class="footprint-item">${esc(p)}</span>`).join("")}</div>` : `<div class="empty-line">No files touched — a real empty set, not ABSENT.</div>`}
    </div>

    <div class="section" style="border-bottom:none;">
      <h3>Timeline <span style="text-transform:none;font-weight:400;color:var(--faint-fg);">(flat, spool order, uncapped)</span></h3>
      <div class="timeline">${timelineHtml}</div>
    </div>
  `;
}

/* ============================== ROUTER ============================== */
function parseRoute(){
  const h = location.hash.replace(/^#\/?/, "");
  if (h === "" ) return { screen: "overview", mode: "loaded" };
  if (h === "empty") return { screen: "overview", mode: "empty" };
  if (h === "error") return { screen: "overview", mode: "error" };
  if (h.startsWith("session/")) return { screen: "session", id: h.slice("session/".length) };
  return { screen: "overview", mode: "loaded" };
}

function go(){
  const route = parseRoute();
  if (route.screen === "overview"){
    if (route.mode === "empty") return renderOverviewEmpty();
    if (route.mode === "error") return renderOverviewError();
    renderOverviewSkeleton();
    setTimeout(() => renderOverviewLoaded(OVERVIEW_LOADED, false), 420);
  } else {
    const s = SESSIONS[route.id];
    if (!s) { renderSessionSkeleton(); setTimeout(() => renderSession404(route.id), 300); return; }
    renderSessionSkeleton();
    setTimeout(() => renderSessionLoaded(s), 380);
  }
}

window.addEventListener("hashchange", go);
go();
</script>
</body>
</html>
